<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zagol Reconciliation | Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Logo & Header -->
      <div class="login-header">
        <h1>Zagol</h1>
        <p>Bank Reconciliation System</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username / Email</label>
          <input type="text" id="username" placeholder="admin@zagol.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox" id="remember"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary">Login</button>
      </form>

      <!-- Demo Credentials -->
      <div class="demo-credentials">
        <small>Demo Credentials:</small><br>
        <small><strong>Username:</strong> admin@zagol.com</small><br>
        <small><strong>Password:</strong> admin123</small>
      </div>

      <div class="login-footer">
        <p>© 2026 Zagol Travel Agency • Reconciliation System</p>
      </div>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
</body>
</html>
